name: ⎈ Release Version

on:
  push:
    tags:
      - v**

env:
  DOCKER_REPO: platzio/backend

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test
    uses: ./.github/workflows/test.yml

  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml
    with:
      push: true
    secrets: inherit

  merge:
    name: 🧬 Assemble manifest list
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏷 Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: 📥 Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🐳 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧬 Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}" \
            $(printf "${DOCKER_REPO}@sha256:%s " *)

      - name: 🔍 Inspect image
        run: |
          docker buildx imagetools inspect "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}"

  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs:
      - merge
    permissions:
      contents: write
      packages: write
    steps:
      - name: 🏗️ Generate OpenAPI schema
        run: |
          docker run --rm \
            ${{ env.DOCKER_REPO }}:${{ needs.merge.outputs.tag }} \
            /root/platz-api openapi schema \
            > openapi.yaml

      - name: ✨ Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ needs.merge.outputs.tag }}
          release_name: ${{ needs.merge.outputs.tag }}

      - name: 📦 Upload OpenAPI schema
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openapi.yaml
          asset_name: openapi.yaml
          asset_content_type: application/vnd.oai.openapi

      - name: 🚀 Publish release
        uses: StuYarrow/publish-release@v1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          id: ${{ steps.create_release.outputs.id }}
