name: ⎈ Release Version

on:
  push:
    tags:
      - v**

env:
  DOCKER_REPO: platzio/backend

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test
    uses: ./.github/workflows/test.yml

  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml
    with:
      push: true
    secrets: inherit

  merge:
    name: 🧬 Assemble manifest list
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏷 Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: 📥 Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🐳 Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🧬 Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}" \
            $(printf "${DOCKER_REPO}@sha256:%s " *)

      - name: 🔍 Inspect image
        run: |
          docker buildx imagetools inspect "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}"

  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs:
      - merge
    permissions:
      contents: write
      packages: write
    steps:
      - name: 🏗️ Generate OpenAPI schema
        run: |
          docker run --rm \
            ${{ env.DOCKER_REPO }}:${{ needs.merge.outputs.tag }} \
            /root/platz-api openapi schema \
            > openapi.yaml

      - name: 🚀 Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.merge.outputs.tag }}
          name: ${{ needs.merge.outputs.tag }}
          files: openapi.yaml
