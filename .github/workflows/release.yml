name: ⎈ Release Version

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - v**

env:
  DOCKER_REPO: platzio/backend

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v5

      - name: 📦 Cargo version
        id: cargo
        run: |
          echo "rustc=$(rustc --version)" >> "${GITHUB_OUTPUT}"

      - name: 🪣 Cache cargo registry
        uses: actions/cache@v4
        with:
          key: ${{ steps.cargo.outputs.rustc }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ steps.cargo.outputs.rustc }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target

      - name: 📎 Cargo clippy
        run: |
          cargo clippy --release -- -D warnings

      - name: 🔨 Cargo test
        run: |
          cargo test --release

  # One image build per architecture, on a native runner. We push by digest;
  # a final `merge` job stitches the two digests into a multi-arch manifest list.
  # Native arm64 runners avoid QEMU emulation, which dominated build time.
  image:
    name: 🐳 Build (${{ matrix.platform }})
    needs:
      - test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: 🧷 Platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "${GITHUB_ENV}"

      - name: 🛎️ Checkout
        uses: actions/checkout@v5

      - name: 🗽 Free disk space
        uses: ShubhamTatvamasi/free-disk-space-action@master

      - name: 🐳 Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PR validation: build the image but don't push. Cache scoped per arch so
      # the two matrix entries don't clobber each other's GHA cache.
      - name: 🐳 Build (PR validation)
        if: github.event_name != 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: BASE_IMAGE=platzio/base:v8
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }}

      # Tag push: build and push by digest. The merge job below assembles the
      # final tagged manifest.
      - name: 🐳 Build & push by digest
        if: github.event_name == 'push'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: BASE_IMAGE=platzio/base:v8
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }}

      - name: 📤 Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: 📦 Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: 🧬 Assemble manifest list
    if: github.event_name == 'push'
    needs:
      - image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 🏷 Get tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"

      - name: 📥 Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🐳 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧬 Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}" \
            $(printf "${DOCKER_REPO}@sha256:%s " *)

      - name: 🔍 Inspect image
        run: |
          docker buildx imagetools inspect "${DOCKER_REPO}:${{ steps.tag.outputs.tag }}"

  release:
    name: 🚀 Create Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - merge
    permissions:
      contents: write
      packages: write
    steps:
      - name: 🏗️ Generate OpenAPI schema
        run: |
          docker run --rm \
            ${{ env.DOCKER_REPO }}:${{ needs.merge.outputs.tag }} \
            /root/platz-api openapi schema \
            > openapi.yaml

      - name: ✨ Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ needs.merge.outputs.tag }}
          release_name: ${{ needs.merge.outputs.tag }}

      - name: 📦 Upload OpenAPI schema
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openapi.yaml
          asset_name: openapi.yaml
          asset_content_type: application/vnd.oai.openapi

      - name: 🚀 Publish release
        uses: StuYarrow/publish-release@v1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          id: ${{ steps.create_release.outputs.id }}
